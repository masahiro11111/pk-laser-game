<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>レーザー妨害 PK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Orbitron:wght@700;900&family=Noto+Sans+JP:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  :root {
    --red: #ff1a1a;
    --green: #00ff88;
    --yellow: #ffe600;
    --bg: #0a0a0f;
    --field: #1a4a1a;
    --field2: #1e5520;
    --net: rgba(255,255,255,0.15);
  }

  body {
    background: var(--bg);
    font-family: 'Orbitron', monospace;
    overflow: hidden;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    user-select: none;
  }

  /* ===== HEADER ===== */
  #header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 16px 6px;
    background: linear-gradient(180deg, #0a0a0f 80%, transparent);
    position: relative;
    z-index: 10;
  }

  #title-text {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    color: var(--red);
    text-shadow: 0 0 12px #ff1a1a88;
    letter-spacing: 2px;
  }

  #score-display {
    font-size: 13px;
    color: var(--green);
    text-align: right;
    line-height: 1.4;
    text-shadow: 0 0 8px #00ff8866;
  }

  #timer-bar-wrap {
    width: 90%;
    height: 6px;
    background: #222;
    border-radius: 3px;
    margin: 0 auto 4px;
    overflow: hidden;
  }
  #timer-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), var(--yellow));
    border-radius: 3px;
    width: 100%;
    transition: width 0.1s linear;
  }

  /* ===== FIELD ===== */
  #game-area {
    position: relative;
    width: 100%;
    flex: 1;
    overflow: hidden;
    cursor: none;
  }

  canvas#field-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
  }

  /* ===== LASER ===== */
  #laser-dot {
    position: absolute;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, var(--red) 35%, transparent 70%);
    box-shadow: 0 0 12px 6px #ff000099, 0 0 30px 10px #ff000044;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 20;
    display: none;
  }

  /* ===== OVERLAY ===== */
  #overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    gap: 18px;
  }

  #overlay h1 {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 32px;
    color: var(--red);
    text-shadow: 0 0 20px #ff1a1a;
    text-align: center;
    line-height: 1.3;
  }

  #overlay .sub {
    font-size: 13px;
    color: #aaa;
    font-family: 'Noto Sans JP', sans-serif;
    text-align: center;
    line-height: 1.8;
  }

  #result-score {
    font-size: 48px;
    color: var(--yellow);
    text-shadow: 0 0 20px #ffe60088;
    font-weight: 900;
  }

  #start-btn {
    background: var(--red);
    color: #fff;
    border: none;
    padding: 14px 40px;
    font-family: 'Orbitron', monospace;
    font-size: 15px;
    font-weight: 700;
    border-radius: 4px;
    cursor: pointer;
    box-shadow: 0 0 20px #ff1a1a88;
    letter-spacing: 2px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #start-btn:active { transform: scale(0.96); }

  #distract-flash {
    position: absolute;
    inset: 0;
    background: rgba(255, 30, 30, 0.18);
    pointer-events: none;
    z-index: 30;
    opacity: 0;
    transition: opacity 0.08s;
  }

  #combo-display {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: 900;
    color: var(--yellow);
    text-shadow: 0 0 16px #ffe600;
    pointer-events: none;
    z-index: 40;
    opacity: 0;
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<div id="header">
  <div id="title-text">⚡ レーザー妨害</div>
  <div id="score-display">
    <span>スコア: <b id="score">0</b></span><br>
    <span>コンボ: <b id="combo">0</b>x</span>
  </div>
</div>
<div id="timer-bar-wrap"><div id="timer-bar"></div></div>

<div id="game-area">
  <canvas id="field-canvas"></canvas>
  <div id="laser-dot"></div>
  <div id="distract-flash"></div>
  <div id="combo-display" id="combo-display"></div>

  <div id="overlay">
    <h1>🔴 レーザー妨害<br>PKゲーム</h1>
    <div class="sub">
      キーパーの目にレーザーを当てろ！<br>
      タップ＆ドラッグで照準を操作<br>
      目に当てるほど高スコア！
    </div>
    <button id="start-btn" onclick="startGame()">ゲームスタート</button>
  </div>
</div>

<script>
const canvas = document.getElementById('field-canvas');
const ctx = canvas.getContext('2d');
const laserDot = document.getElementById('laser-dot');
const overlay = document.getElementById('overlay');
const timerBar = document.getElementById('timer-bar');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const flash = document.getElementById('distract-flash');
const comboDisplay = document.getElementById('combo-display');

let W, H;
let gkX, gkY, gkVX = 0;
let laserX = -100, laserY = -100;
let score = 0, combo = 0, maxCombo = 0;
let timeLeft = 30;
let timerInterval, animFrame;
let playing = false;
let distractTimer = 0;

// GK state
let gkState = 'idle'; // idle, dive, recover
let gkDiveDir = 0;
let gkDiveProgress = 0;
let gkBaseX;
let gkDazzled = false;
let dazzleTimer = 0;

function resize() {
  W = canvas.offsetWidth;
  H = canvas.offsetHeight;
  canvas.width = W;
  canvas.height = H;
  gkBaseX = W / 2;
  gkX = gkBaseX;
  gkY = H * 0.38;
}
resize();
window.addEventListener('resize', () => { resize(); });

// ===== INPUT =====
const gameArea = document.getElementById('game-area');

function getPos(e) {
  const rect = gameArea.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

gameArea.addEventListener('pointermove', e => {
  if (!playing) return;
  const p = getPos(e);
  laserX = p.x; laserY = p.y;
  laserDot.style.left = laserX + 'px';
  laserDot.style.top = laserY + 'px';
});
gameArea.addEventListener('pointerdown', e => {
  if (!playing) return;
  const p = getPos(e);
  laserX = p.x; laserY = p.y;
  laserDot.style.display = 'block';
  laserDot.style.left = laserX + 'px';
  laserDot.style.top = laserY + 'px';
});
gameArea.addEventListener('pointerup', () => {
  laserDot.style.display = 'none';
  laserX = -999; laserY = -999;
});
gameArea.addEventListener('pointerleave', () => {
  laserDot.style.display = 'none';
  laserX = -999; laserY = -999;
});

// ===== DRAW FIELD =====
function drawField() {
  // Grass
  const rows = 8;
  const rowH = H / rows;
  for (let i = 0; i < rows; i++) {
    ctx.fillStyle = i % 2 === 0 ? '#1a4a1a' : '#1e5520';
    ctx.fillRect(0, i * rowH, W, rowH);
  }

  // Goal area markings
  const goalW = W * 0.72;
  const goalH = H * 0.52;
  const goalLeft = (W - goalW) / 2;
  const goalTop = H * 0.06;

  // Penalty box
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 2;
  ctx.strokeRect(goalLeft, goalTop, goalW, goalH);

  // Goal net top
  const netTop = goalTop;
  const netLeft = goalLeft + goalW * 0.08;
  const netRight = goalLeft + goalW * 0.92;
  const netBottom = goalTop + H * 0.28;

  // Net background
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(netLeft, netTop, netRight - netLeft, netBottom - netTop);

  // Net lines
  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = 1;
  const netW = netRight - netLeft;
  const netH2 = netBottom - netTop;
  const cols = 14, nrows = 6;
  for (let c = 0; c <= cols; c++) {
    ctx.beginPath();
    ctx.moveTo(netLeft + (netW / cols) * c, netTop);
    ctx.lineTo(netLeft + (netW / cols) * c, netBottom);
    ctx.stroke();
  }
  for (let r = 0; r <= nrows; r++) {
    ctx.beginPath();
    ctx.moveTo(netLeft, netTop + (netH2 / nrows) * r);
    ctx.lineTo(netRight, netTop + (netH2 / nrows) * r);
    ctx.stroke();
  }

  // Goal posts
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 5;
  ctx.strokeRect(netLeft, netTop, netRight - netLeft, netBottom - netTop);

  // Penalty spot
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.beginPath();
  ctx.arc(W / 2, H * 0.72, 5, 0, Math.PI * 2);
  ctx.fill();

  // Center line partial
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, H * 0.85);
  ctx.lineTo(W, H * 0.85);
  ctx.stroke();
}

function drawGK() {
  const x = gkX;
  const y = gkY;
  const scale = Math.min(W, H) / 400;

  ctx.save();
  ctx.translate(x, y);

  let tilt = 0;
  if (gkState === 'dive') {
    tilt = gkDiveDir * gkDiveProgress * 0.8;
    ctx.rotate(tilt);
    ctx.translate(gkDiveDir * gkDiveProgress * 30, gkDiveProgress * 10);
  }

  if (gkDazzled) {
    ctx.shadowColor = '#ff0';
    ctx.shadowBlur = 20;
  }

  const bodyW = 28 * scale;
  const bodyH = 44 * scale;
  const headR = 16 * scale;

  // Jersey (GK yellow-green)
  const jerseyColor = gkDazzled ? '#ff9900' : '#c8ff00';
  ctx.fillStyle = jerseyColor;
  ctx.beginPath();
  ctx.roundRect(-bodyW / 2, -bodyH / 2, bodyW, bodyH, 6 * scale);
  ctx.fill();
  ctx.strokeStyle = '#888800';
  ctx.lineWidth = 1.5 * scale;
  ctx.stroke();

  // Arms
  ctx.fillStyle = jerseyColor;
  // Left arm
  let armAngle = gkState === 'dive' ? -0.6 * gkDiveDir : Math.sin(Date.now() / 400) * 0.15;
  ctx.save();
  ctx.translate(-bodyW / 2 - 2 * scale, -bodyH * 0.2);
  ctx.rotate(armAngle - 0.3);
  ctx.fillRect(-6 * scale, 0, 12 * scale, 30 * scale);
  ctx.restore();
  // Right arm
  ctx.save();
  ctx.translate(bodyW / 2 + 2 * scale, -bodyH * 0.2);
  ctx.rotate(-armAngle + 0.3);
  ctx.fillRect(-6 * scale, 0, 12 * scale, 30 * scale);
  ctx.restore();

  // Legs
  ctx.fillStyle = '#111';
  ctx.fillRect(-bodyW / 2, bodyH / 2 - 4 * scale, 12 * scale, 22 * scale);
  ctx.fillRect(bodyW / 2 - 12 * scale, bodyH / 2 - 4 * scale, 12 * scale, 22 * scale);

  // Gloves
  ctx.fillStyle = '#ff6600';
  ctx.beginPath();
  ctx.arc(-bodyW / 2 - 2 * scale, bodyH * 0.1, 8 * scale, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(bodyW / 2 + 2 * scale, bodyH * 0.1, 8 * scale, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#f5c58a';
  ctx.beginPath();
  ctx.arc(0, -bodyH / 2 - headR * 0.8, headR, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#3a1a00';
  ctx.beginPath();
  ctx.arc(0, -bodyH / 2 - headR * 0.8, headR, Math.PI, 0);
  ctx.fill();

  // Eyes
  const eyeY = -bodyH / 2 - headR * 0.8 + 2 * scale;
  if (gkDazzled) {
    // Dazzled eyes: spirals/Xs
    ctx.fillStyle = '#ff0';
    ctx.font = `${10 * scale}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('✕', -6 * scale, eyeY + 4 * scale);
    ctx.fillText('✕', 6 * scale, eyeY + 4 * scale);
  } else {
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.ellipse(-6 * scale, eyeY, 3.5 * scale, 4 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(6 * scale, eyeY, 3.5 * scale, 4 * scale, 0, 0, Math.PI * 2);
    ctx.fill();
    // Pupils track laser
    const dx = laserX - x;
    const dy = laserY - y;
    const dist = Math.sqrt(dx * dx + dy * dy) || 1;
    const px = (dx / dist) * 2 * scale;
    const py = (dy / dist) * 2 * scale;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-6 * scale + px, eyeY + py, 1.5 * scale, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(6 * scale + px, eyeY + py, 1.5 * scale, 0, Math.PI * 2);
    ctx.fill();
  }

  // GK number
  ctx.fillStyle = '#000';
  ctx.font = `bold ${9 * scale}px Orbitron`;
  ctx.textAlign = 'center';
  ctx.fillText('1', 0, 4 * scale);

  ctx.restore();

  // Dazzle stars
  if (gkDazzled) {
    const t = Date.now() / 150;
    for (let i = 0; i < 5; i++) {
      const angle = t + (i / 5) * Math.PI * 2;
      const r = 34 * scale;
      const sx = x + Math.cos(angle) * r;
      const sy = y - bodyH / 2 - headR * 0.8 + Math.sin(angle) * r * 0.5;
      ctx.save();
      ctx.fillStyle = '#ffe600';
      ctx.font = `${14 * scale}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.fillText('★', sx, sy);
      ctx.restore();
    }
  }
}

function drawLaserBeam() {
  if (laserX < 0) return;
  // Beam from bottom center to laser
  const srcX = W / 2;
  const srcY = H * 0.78;
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.strokeStyle = '#ff3333';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(srcX, srcY);
  ctx.lineTo(laserX, laserY);
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.setLineDash([]);
  ctx.restore();
}

function drawBall() {
  const bx = W / 2;
  const by = H * 0.75;
  const r = Math.min(W, H) / 28;
  ctx.save();
  ctx.fillStyle = '#fff';
  ctx.shadowColor = '#000';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(bx, by, r, 0, Math.PI * 2);
  ctx.fill();
  // Pentagon patches
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(bx, by, r * 0.35, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ===== GK AI =====
function updateGK(dt) {
  const scale = Math.min(W, H) / 400;
  const netLeft = W * 0.5 - W * 0.72 * 0.5 * 0.84;
  const netRight = W * 0.5 + W * 0.72 * 0.5 * 0.84;

  if (gkDazzled) {
    dazzleTimer -= dt;
    if (dazzleTimer <= 0) { gkDazzled = false; }
  }

  if (gkState === 'idle') {
    // Patrol
    gkVX = Math.sin(Date.now() / 900) * (gkDazzled ? 40 : 90);
    gkX += gkVX * dt;
    gkX = Math.max(netLeft + 20, Math.min(netRight - 20, gkX));

    // Occasionally dive
    if (!gkDazzled && Math.random() < dt * 0.6) {
      gkState = 'dive';
      gkDiveDir = Math.random() < 0.5 ? -1 : 1;
      gkDiveProgress = 0;
    }
  } else if (gkState === 'dive') {
    gkDiveProgress = Math.min(1, gkDiveProgress + dt * 1.8);
    gkX += gkDiveDir * 110 * dt;
    gkX = Math.max(netLeft + 10, Math.min(netRight - 10, gkX));
    if (gkDiveProgress >= 1) {
      gkState = 'recover';
    }
  } else if (gkState === 'recover') {
    gkDiveProgress = Math.max(0, gkDiveProgress - dt * 2.5);
    const target = gkBaseX;
    gkX += (target - gkX) * dt * 3;
    if (gkDiveProgress <= 0) { gkState = 'idle'; }
  }
}

// ===== HIT DETECTION =====
function checkHit() {
  if (laserX < 0) return;
  const scale = Math.min(W, H) / 400;
  const headR = 16 * scale;
  const bodyH = 44 * scale;
  const eyeX = gkX;
  const eyeY = gkY - bodyH / 2 - headR * 0.8;
  const dx = laserX - eyeX;
  const dy = laserY - eyeY;
  const dist = Math.sqrt(dx * dx + dy * dy);

  if (dist < headR * 1.4) {
    // Eye hit!
    if (!gkDazzled) {
      gkDazzled = true;
      dazzleTimer = 1.8;
      combo++;
      maxCombo = Math.max(maxCombo, combo);
      const pts = 10 * combo;
      score += pts;
      scoreEl.textContent = score;
      comboEl.textContent = combo;

      // Flash effect
      flash.style.opacity = '1';
      setTimeout(() => flash.style.opacity = '0', 120);

      // Combo popup
      comboDisplay.textContent = combo >= 3 ? `${combo}x COMBO! +${pts}` : `+${pts}`;
      comboDisplay.style.opacity = '1';
      clearTimeout(comboDisplay._t);
      comboDisplay._t = setTimeout(() => comboDisplay.style.opacity = '0', 600);

      return;
    }
  }

  // Near head (body)
  if (dist < headR * 3) {
    combo = Math.max(0, combo - 0);
    // slight score
    score += 1;
    scoreEl.textContent = score;
  } else {
    combo = 0;
    comboEl.textContent = combo;
  }
}

// ===== GAME LOOP =====
let lastTime = 0;
function loop(ts) {
  if (!playing) return;
  const dt = Math.min((ts - lastTime) / 1000, 0.1);
  lastTime = ts;

  ctx.clearRect(0, 0, W, H);
  drawField();
  drawLaserBeam();
  drawGK();
  drawBall();

  updateGK(dt);
  checkHit();

  animFrame = requestAnimationFrame(loop);
}

// ===== TIMER =====
function startTimer() {
  timeLeft = 30;
  timerBar.style.width = '100%';
  timerBar.style.background = 'linear-gradient(90deg, #00ff88, #ffe600)';
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    const pct = (timeLeft / 30) * 100;
    timerBar.style.width = pct + '%';
    if (pct < 30) timerBar.style.background = 'linear-gradient(90deg, #ff4400, #ff0000)';
    else if (pct < 60) timerBar.style.background = 'linear-gradient(90deg, #ffe600, #ff6600)';
    if (timeLeft <= 0) endGame();
  }, 100);
}

function startGame() {
  score = 0; combo = 0; maxCombo = 0;
  gkX = W / 2; gkState = 'idle'; gkDiveProgress = 0; gkDazzled = false;
  scoreEl.textContent = '0';
  comboEl.textContent = '0';
  overlay.style.display = 'none';
  laserDot.style.display = 'none';
  playing = true;
  startTimer();
  lastTime = performance.now();
  animFrame = requestAnimationFrame(loop);
}

function endGame() {
  playing = false;
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrame);
  laserDot.style.display = 'none';

  let grade = score >= 500 ? '👑 LEGENDARY' : score >= 300 ? '🔥 EXPERT' : score >= 150 ? '⚡ GOOD' : '😅 KEEP TRYING';

  overlay.innerHTML = `
    <h1>タイムアップ！</h1>
    <div class="sub">最終スコア</div>
    <div id="result-score">${score}</div>
    <div class="sub">最大コンボ: <b style="color:#00ff88">${maxCombo}x</b><br><br>${grade}</div>
    <button class="start-btn" id="start-btn" onclick="startGame()" style="background:#ff1a1a;color:#fff;border:none;padding:14px 40px;font-family:Orbitron,monospace;font-size:15px;font-weight:700;border-radius:4px;cursor:pointer;box-shadow:0 0 20px #ff1a1a88;letter-spacing:2px;">もう一度</button>
  `;
  overlay.style.display = 'flex';
}
</script>
</body>
</html>
