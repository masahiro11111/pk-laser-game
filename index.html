<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>レーザー妨害 PK</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Noto+Sans+JP:wght@400;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
  body {
    background:#0a0c10; font-family:'Russo One',sans-serif;
    overflow:hidden; height:100dvh;
    display:flex; flex-direction:column; align-items:center; user-select:none;
  }
  #hud {
    width:100%; display:flex; justify-content:space-between; align-items:center;
    padding:8px 14px 4px;
    background:linear-gradient(180deg,#0a0c10 70%,transparent);
    position:relative; z-index:10;
  }
  #title-text { font-size:18px; color:#00ff66; text-shadow:0 0 10px #00ff6699; letter-spacing:1px; }
  #score-display { font-size:12px; color:#fff; text-align:right; line-height:1.6; }
  #score-display b { color:#00ff66; text-shadow:0 0 6px #00ff6688; }
  #timer-bar-wrap { width:92%; height:5px; background:#1a1a2e; border-radius:3px; margin:0 auto 3px; overflow:hidden; }
  #timer-bar { height:100%; background:linear-gradient(90deg,#00ff66,#88ff00); border-radius:3px; width:100%; transition:width 0.1s linear; }
  #game-area { position:relative; width:100%; flex:1; overflow:hidden; cursor:none; }
  canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  #laser-dot {
    position:absolute; width:22px; height:22px; border-radius:50%;
    background:radial-gradient(circle, #ffffff 0%, #aaffaa 25%, #00ff44 50%, transparent 72%);
    box-shadow:0 0 14px 6px #00ff4499, 0 0 36px 14px #00ff4455, 0 0 60px 24px #00ff4422;
    transform:translate(-50%,-50%); pointer-events:none; z-index:20; display:none;
    animation:gpulse 0.12s ease-in-out infinite alternate;
  }
  @keyframes gpulse {
    from { transform:translate(-50%,-50%) scale(1); }
    to   { transform:translate(-50%,-50%) scale(1.22); }
  }
  #distract-flash {
    position:absolute; inset:0;
    background:radial-gradient(circle at 50% 35%, rgba(0,255,80,0.22) 0%, transparent 70%);
    pointer-events:none; z-index:30; opacity:0; transition:opacity 0.07s;
  }
  #combo-pop {
    position:absolute; top:38%; left:50%; transform:translate(-50%,-50%);
    font-size:26px; color:#00ff88; text-shadow:0 0 18px #00ff88;
    pointer-events:none; z-index:40; opacity:0; transition:opacity 0.25s; white-space:nowrap;
  }
  #overlay {
    position:absolute; inset:0; background:rgba(0,0,0,0.88);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:50; gap:16px;
  }
  #overlay h1 { font-size:28px; color:#00ff66; text-shadow:0 0 20px #00ff66; text-align:center; line-height:1.35; }
  .sub { font-size:13px; color:#bbb; font-family:'Noto Sans JP',sans-serif; text-align:center; line-height:1.9; }
  .btn {
    background:linear-gradient(135deg,#00cc44,#007722); color:#fff; border:none;
    padding:13px 38px; font-family:'Russo One',sans-serif; font-size:15px;
    border-radius:6px; cursor:pointer; box-shadow:0 0 22px #00ff4466;
    letter-spacing:1px; transition:transform 0.1s;
  }
  .btn:active { transform:scale(0.95); }
</style>
</head>
<body>
<div id="hud">
  <div id="title-text">🟢 LASER SNIPER</div>
  <div id="score-display">スコア <b id="score">0</b> &nbsp;|&nbsp; コンボ <b id="combo">0</b>x</div>
</div>
<div id="timer-bar-wrap"><div id="timer-bar"></div></div>
<div id="game-area">
  <canvas id="c"></canvas>
  <div id="laser-dot"></div>
  <div id="distract-flash"></div>
  <div id="combo-pop"></div>
  <div id="overlay">
    <h1>🟢 レーザー妨害<br>PKゲーム</h1>
    <div class="sub">観客席からキーパーの目に<br>緑レーザーを当てろ！<br>タップ＆ドラッグで照準を操作</div>
    <button class="btn" onclick="startGame()">KICK OFF</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const laserDot = document.getElementById('laser-dot');
const overlay = document.getElementById('overlay');
const timerBar = document.getElementById('timer-bar');
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const flash = document.getElementById('distract-flash');
const comboPop = document.getElementById('combo-pop');

let W, H, laserX=-999, laserY=-999;
let score=0, combo=0, maxCombo=0, timeLeft=30;
let timerInterval, animFrame, playing=false;
let gkX, gkY, gkBaseX, laserSrcX, laserSrcY;
let gkState='idle', gkDiveDir=1, gkDiveP=0;
let gkDazzled=false, dazzleT=0;
let gkFeintDir=1, gkFeintT=0, gkPhase=0;

// ── GUARD STATE ───────────────────────────────────────
// Phases: 'off' → 'warning' (3s照射で警告) → 'approaching' (歩いてくる) → 'grabbing' (減点中) → 'leaving' (退場)
let guardState = 'off';
let continuousHitTime = 0;   // レーザーを当て続けた累計秒数
let guardX, guardY;          // 警備員の現在位置
let guardTargetX, guardTargetY; // 目標位置
let guardWalkT = 0;          // 歩行アニメ用
let guardWarningT = 0;       // 警告表示タイマー
let guardGrabT = 0;          // 掴んでいる時間
let guardLeaveT = 0;         // 退場タイマー
let guardPenaltyAccum = 0;   // 減点蓄積
let guardAlerted = false;    // 一度警告が出たか

function resize() {
  W = canvas.offsetWidth; H = canvas.offsetHeight;
  canvas.width = W; canvas.height = H;
  gkBaseX = W/2; gkX = gkBaseX; gkY = H*0.36;
  laserSrcX = W*0.88; laserSrcY = H*0.82;
}
resize(); window.addEventListener('resize', resize);

const ga = document.getElementById('game-area');
function gp(e) {
  const r = ga.getBoundingClientRect(), s = e.touches ? e.touches[0] : e;
  return { x: s.clientX-r.left, y: s.clientY-r.top };
}
ga.addEventListener('pointermove', e => {
  if (!playing) return;
  const p=gp(e); laserX=p.x; laserY=p.y;
  laserDot.style.left=laserX+'px'; laserDot.style.top=laserY+'px';
});
ga.addEventListener('pointerdown', e => {
  if (!playing) return;
  const p=gp(e); laserX=p.x; laserY=p.y;
  laserDot.style.display='block';
  laserDot.style.left=laserX+'px'; laserDot.style.top=laserY+'px';
});
ga.addEventListener('pointerup',    () => { laserDot.style.display='none'; laserX=laserY=-999; });
ga.addEventListener('pointerleave', () => { laserDot.style.display='none'; laserX=laserY=-999; });

// ── STADIUM ───────────────────────────────────────────
function drawStadium() {
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#060a14'); sky.addColorStop(1,'#0d1a0d');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // Floodlight haze
  [[W*0.08,H*0.1],[W*0.92,H*0.1]].forEach(([lx,ly])=>{
    const g=ctx.createRadialGradient(lx,ly,0,lx,ly,H*0.55);
    g.addColorStop(0,'rgba(255,255,210,0.09)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  });

  drawStands(); drawPitch(); drawGoal();
}

function drawStands() {
  const standH = H*0.30;
  const sg = ctx.createLinearGradient(0,0,0,standH);
  sg.addColorStop(0,'#1c2030'); sg.addColorStop(1,'#0e1118');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,standH+4);

  const rowCount=7, rowH=(standH*0.78)/rowCount;
  const seatCols=['#b03030','#1a4a80','#b03030','#154070','#882222','#1a4878','#b03030'];
  for(let r=0;r<rowCount;r++){
    const ry=standH*0.12+r*rowH;
    ctx.fillStyle=seatCols[r%seatCols.length];
    ctx.globalAlpha=0.5-r*0.04;
    ctx.fillRect(0,ry,W,rowH-1);
    ctx.globalAlpha=1;
    drawCrowdRow(0,ry,W,rowH,r);
  }
  ctx.fillStyle='rgba(240,240,220,0.2)';
  ctx.fillRect(0,standH-2,W,3);

  drawAdBoards(standH);
}

function drawCrowdRow(x,y,w,rh,rowIdx) {
  const personW=Math.max(8,W/36);
  const count=Math.floor(w/personW);
  const headR=rh*0.26, seed=rowIdx*137;
  const skinTones=['#f5c58a','#c68642','#e8b89a','#8d5524','#f0c080'];
  const jerseyC=['#c0392b','#2471a3','#27ae60','#8e44ad','#f39c12','#1abc9c','#e67e22'];
  for(let i=0;i<count;i++){
    const px=x+i*personW+personW*0.5;
    const py=y+rh*0.72;
    const h=((seed+i*31)%20)-10;
    const raised=((seed+i*17)%5)===0;
    const sk=skinTones[(seed+i*7)%skinTones.length];
    ctx.fillStyle=jerseyC[(seed+i*13)%jerseyC.length];
    ctx.globalAlpha=0.78;
    ctx.fillRect(px-personW*0.36,py-rh*0.52+h,personW*0.72,rh*0.46);
    ctx.fillStyle=sk; ctx.globalAlpha=0.88;
    ctx.beginPath(); ctx.arc(px,py-rh*0.6+h,headR,0,Math.PI*2); ctx.fill();
    if(raised){
      ctx.strokeStyle=sk; ctx.lineWidth=Math.max(1.5,rh*0.12); ctx.globalAlpha=0.65;
      ctx.beginPath(); ctx.moveTo(px-personW*0.18,py-rh*0.52+h); ctx.lineTo(px-personW*0.48,py-rh*0.88+h); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px+personW*0.18,py-rh*0.52+h); ctx.lineTo(px+personW*0.48,py-rh*0.88+h); ctx.stroke();
    }
    ctx.globalAlpha=1;
  }
}

function drawAdBoards(y) {
  const bh=H*0.036;
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,y,W,bh);
  const boards=[
    {color:'#e74c3c',text:'NIKE'},{color:'#2980b9',text:'ADIDAS'},
    {color:'#f39c12',text:'PUMA'},{color:'#27ae60',text:'BETWAY'},
    {color:'#8e44ad',text:'EA SPORTS'},{color:'#c0392b',text:'SONY'},
  ];
  const bw=W/boards.length;
  boards.forEach((b,i)=>{
    ctx.fillStyle=b.color; ctx.fillRect(i*bw+1,y+1,bw-2,bh-2);
    ctx.fillStyle='#fff';
    ctx.font=`bold ${Math.max(9,bh*0.55)}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(b.text,i*bw+bw/2,y+bh/2);
  });
  ctx.textBaseline='alphabetic';
}

function drawPitch() {
  const pt=H*0.30;
  for(let i=0;i<10;i++){
    const sy=pt+(H-pt)*(i/10), ey=pt+(H-pt)*((i+1)/10);
    ctx.fillStyle=i%2===0?'#1e5c1e':'#1a5218';
    ctx.fillRect(0,sy,W,ey-sy);
  }
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=1.5;
  const boxW=W*0.62,boxH=H*0.13,boxL=(W-boxW)/2,boxT=H*0.31;
  ctx.strokeRect(boxL,boxT,boxW,boxH);
  ctx.fillStyle='rgba(255,255,255,0.65)';
  ctx.beginPath(); ctx.arc(W/2,H*0.75,4,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(W/2,H*0.88,W*0.22,Math.PI*1.1,Math.PI*1.9); ctx.stroke();

  const glare=ctx.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,W*0.6);
  glare.addColorStop(0,'rgba(255,255,230,0.07)'); glare.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glare; ctx.fillRect(0,H*0.3,W,H*0.7);
}

function drawGoal() {
  const nw=W*0.62,nh=H*0.22,nl=(W-nw)/2,nt=H*0.085,nb=nt+nh;
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(nl+4,nt+4,nw-8,nh);
  ctx.fillStyle='rgba(15,18,28,0.72)'; ctx.fillRect(nl,nt,nw,nh);
  ctx.strokeStyle='rgba(190,205,225,0.25)'; ctx.lineWidth=0.8;
  for(let c=0;c<=18;c++){
    ctx.beginPath(); ctx.moveTo(nl+(nw/18)*c,nt); ctx.lineTo(nl+(nw/18)*c,nb); ctx.stroke();
  }
  for(let r=0;r<=8;r++){
    ctx.beginPath(); ctx.moveTo(nl,nt+(nh/8)*r); ctx.lineTo(nl+nw,nt+(nh/8)*r); ctx.stroke();
  }
  const pw=7;
  // Left post
  const lg=ctx.createLinearGradient(nl,0,nl+pw,0);
  lg.addColorStop(0,'#999'); lg.addColorStop(0.4,'#fff'); lg.addColorStop(1,'#777');
  ctx.fillStyle=lg; ctx.fillRect(nl-pw/2,nt,pw,nh+pw/2);
  // Right post
  const rg=ctx.createLinearGradient(nl+nw-pw,0,nl+nw,0);
  rg.addColorStop(0,'#777'); rg.addColorStop(0.6,'#fff'); rg.addColorStop(1,'#999');
  ctx.fillStyle=rg; ctx.fillRect(nl+nw-pw/2,nt,pw,nh+pw/2);
  // Crossbar
  const cg=ctx.createLinearGradient(0,nt,0,nt+pw);
  cg.addColorStop(0,'#fff'); cg.addColorStop(0.5,'#ddd'); cg.addColorStop(1,'#888');
  ctx.fillStyle=cg; ctx.fillRect(nl-pw/2,nt-pw/2,nw+pw,pw);
  // Ground shadows
  ctx.fillStyle='rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(nl,nb+8,8,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(nl+nw,nb+8,8,3,0,0,Math.PI*2); ctx.fill();
}

// ── GOALKEEPER ───────────────────────────────────────
function drawGK() {
  const sc=Math.min(W,H)/380;
  const x=gkX, y=gkY;
  ctx.save(); ctx.translate(x,y);

  if(gkState==='dive'){
    ctx.rotate(gkDiveDir*gkDiveP*0.82);
    ctx.translate(gkDiveDir*gkDiveP*26*sc, gkDiveP*10*sc);
  }

  const bw=30*sc, bh=48*sc, hr=18*sc;

  // Shadow
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.beginPath(); ctx.ellipse(0,bh/2+5*sc,bw*0.9,4*sc,0,0,Math.PI*2); ctx.fill();
  ctx.restore();

  // Boots
  ctx.fillStyle='#111';
  ctx.fillRect(-bw*0.18-7*sc, bh*0.45+26*sc, 15*sc, 7*sc);
  ctx.fillRect( bw*0.18-8*sc, bh*0.45+26*sc, 15*sc, 7*sc);
  // Boot stripes
  ctx.fillStyle='#fff';
  ctx.fillRect(-bw*0.18-4*sc, bh*0.45+27*sc, 8*sc, 2*sc);
  ctx.fillRect( bw*0.18-4*sc, bh*0.45+27*sc, 8*sc, 2*sc);

  // Socks
  ctx.fillStyle='#f1c40f';
  ctx.fillRect(-bw*0.18-6*sc, bh*0.45+17*sc, 12*sc, 11*sc);
  ctx.fillRect( bw*0.18-6*sc, bh*0.45+17*sc, 12*sc, 11*sc);
  // Sock stripe
  ctx.fillStyle='#111';
  ctx.fillRect(-bw*0.18-6*sc, bh*0.45+19*sc, 12*sc, 2*sc);
  ctx.fillRect( bw*0.18-6*sc, bh*0.45+19*sc, 12*sc, 2*sc);

  // Shorts
  ctx.fillStyle='#111827';
  ctx.beginPath(); ctx.roundRect(-bw*0.52, bh*0.38, bw*1.04, bh*0.22, 3*sc); ctx.fill();
  // Shorts stripe
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.fillRect(-bw*0.4, bh*0.42, bw*0.36, bh*0.14);
  ctx.fillRect(bw*0.04, bh*0.42, bw*0.36, bh*0.14);

  // Jersey gradient (lime yellow)
  const jg=ctx.createLinearGradient(-bw/2,-bh/2,bw/2,bh/2);
  if(gkDazzled){
    jg.addColorStop(0,'#ff8800'); jg.addColorStop(0.5,'#ffaa00'); jg.addColorStop(1,'#cc6600');
  } else {
    jg.addColorStop(0,'#e2f000'); jg.addColorStop(0.45,'#c5da00'); jg.addColorStop(1,'#96aa00');
  }
  ctx.fillStyle=jg;
  ctx.beginPath(); ctx.roundRect(-bw/2,-bh/2,bw,bh,[5*sc,5*sc,3*sc,3*sc]); ctx.fill();
  // Jersey side darken
  ctx.fillStyle='rgba(0,0,0,0.14)';
  ctx.beginPath(); ctx.roundRect(-bw/2,-bh/2,bw*0.2,bh,[5*sc,0,0,3*sc]); ctx.fill();
  ctx.beginPath(); ctx.roundRect(bw/2-bw*0.2,-bh/2,bw*0.2,bh,[0,5*sc,3*sc,0]); ctx.fill();
  // Jersey center line
  ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=1*sc;
  ctx.beginPath(); ctx.moveTo(0,-bh/2); ctx.lineTo(0,bh/2); ctx.stroke();
  // Sponsor text
  ctx.fillStyle=gkDazzled?'#fff':'rgba(0,40,0,0.7)';
  ctx.font=`bold ${8*sc}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('GK',0,-bh*0.08); ctx.textBaseline='alphabetic';
  // Collar
  ctx.fillStyle=gkDazzled?'#cc5500':'#7a9900';
  ctx.beginPath(); ctx.roundRect(-bw*0.14,-bh/2,bw*0.28,7*sc,3*sc); ctx.fill();

  // Arms
  function drawArm(side, angle) {
    ctx.save(); ctx.translate(side*(bw/2+2*sc),-bh*0.2); ctx.rotate(angle);
    const ag=ctx.createLinearGradient(0,0,10*sc,28*sc);
    if(gkDazzled){ ag.addColorStop(0,'#ff8800'); ag.addColorStop(1,'#cc6600'); }
    else { ag.addColorStop(0,'#c5da00'); ag.addColorStop(1,'#96aa00'); }
    ctx.fillStyle=ag;
    ctx.beginPath(); ctx.roundRect(-5*sc,0,10*sc,30*sc,5*sc); ctx.fill();
    ctx.restore();
  }
  if(gkState==='dive'){
    drawArm(-1,-gkDiveDir*1.1); drawArm(1,gkDiveDir*0.3);
  } else {
    const sw=Math.sin(Date.now()/380);
    drawArm(-1,sw*0.18-0.3); drawArm(1,-sw*0.18+0.3);
  }

  // Gloves
  function drawGlove(ox,oy) {
    ctx.save(); ctx.translate(ox,oy);
    ctx.fillStyle='#cc3300';
    ctx.beginPath(); ctx.ellipse(0,0,10*sc,8*sc,0,0,Math.PI*2); ctx.fill();
    // Padding ridges
    ctx.fillStyle='#991100';
    for(let f=-2;f<=2;f++){
      ctx.fillRect(f*3*sc-1*sc,-7*sc,2*sc,5*sc);
    }
    ctx.fillStyle='#fff';
    ctx.fillRect(-9*sc,-3*sc,18*sc,3.5*sc);
    ctx.restore();
  }
  if(gkState==='dive'){
    drawGlove(gkDiveDir*bw*0.72,-bh*0.52); drawGlove(-gkDiveDir*bw*0.28,bh*0.08);
  } else {
    drawGlove(-bw/2-9*sc,-bh*0.17); drawGlove(bw/2+9*sc,-bh*0.17);
  }

  // Neck
  ctx.fillStyle='#d4956a';
  ctx.beginPath(); ctx.roundRect(-5*sc,-bh/2,10*sc,9*sc,2*sc); ctx.fill();

  // Head
  const hx=0, hy=-bh/2-hr*0.88;
  const hg=ctx.createRadialGradient(-5*sc,hy-5*sc,2*sc,hx,hy,hr);
  hg.addColorStop(0,'#f8d5a0'); hg.addColorStop(0.65,'#e8b87a'); hg.addColorStop(1,'#c8965a');
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.ellipse(hx,hy,hr,hr*1.06,0,0,Math.PI*2); ctx.fill();

  // Jaw highlight
  ctx.fillStyle='rgba(200,140,90,0.3)';
  ctx.beginPath(); ctx.ellipse(hx,hy+hr*0.62,hr*0.55,hr*0.3,0,0,Math.PI); ctx.fill();

  // Ears
  ctx.fillStyle='#d4956a';
  ctx.beginPath(); ctx.ellipse(-hr*0.92,hy+2*sc,5*sc,6*sc,-0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hr*0.92,hy+2*sc,5*sc,6*sc,0.2,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#c08050';
  ctx.beginPath(); ctx.ellipse(-hr*0.92,hy+2*sc,2.5*sc,3.5*sc,-0.2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hr*0.92,hy+2*sc,2.5*sc,3.5*sc,0.2,0,Math.PI*2); ctx.fill();

  // Hair
  ctx.fillStyle='#2c1a08';
  ctx.beginPath(); ctx.ellipse(hx,hy-hr*0.06,hr*0.97,hr*0.65,0,Math.PI,0); ctx.fill();
  // Hair highlight
  ctx.fillStyle='#4a2e12';
  ctx.beginPath(); ctx.ellipse(hx-6*sc,hy-hr*0.38,hr*0.3,hr*0.18,-0.35,0,Math.PI*2); ctx.fill();
  // Hair texture lines
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=0.8*sc;
  for(let l=-1;l<=1;l++){
    ctx.beginPath(); ctx.moveTo(l*8*sc,hy-hr*0.9); ctx.quadraticCurveTo(l*10*sc,hy-hr*0.5,l*6*sc,hy-hr*0.1); ctx.stroke();
  }

  // Eyebrows
  ctx.strokeStyle='#1e1008'; ctx.lineWidth=2.5*sc; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-hr*0.54,hy-hr*0.17); ctx.lineTo(-hr*0.1,hy-hr*0.26); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(hr*0.1,hy-hr*0.26);  ctx.lineTo(hr*0.54,hy-hr*0.17); ctx.stroke();

  // Eyes
  const eyeY=hy-hr*0.02;
  if(gkDazzled){
    // Spiral dazzle eyes
    eyeOffsets=[-hr*0.33, hr*0.33];
    eyeOffsets.forEach(ex=>{
      ctx.strokeStyle='#00ff44'; ctx.lineWidth=1.6*sc;
      ctx.beginPath();
      const t2=Date.now()/180;
      for(let a=0.1;a<Math.PI*4;a+=0.15){
        const r2=a*1.1*sc;
        const px2=ex+Math.cos(a+t2)*r2, py2=eyeY+Math.sin(a+t2)*r2;
        a<0.15?ctx.moveTo(px2,py2):ctx.lineTo(px2,py2);
      }
      ctx.stroke();
    });
    ctx.fillStyle='rgba(0,255,60,0.14)';
    ctx.beginPath(); ctx.ellipse(hx,hy,hr,hr*1.06,0,0,Math.PI*2); ctx.fill();
  } else {
    [-hr*0.33, hr*0.33].forEach(ex=>{
      // Sclera
      ctx.fillStyle='#f5f5f0';
      ctx.beginPath(); ctx.ellipse(ex,eyeY,5.5*sc,4.5*sc,0,0,Math.PI*2); ctx.fill();
      // Iris
      ctx.fillStyle='#3a70a8';
      ctx.beginPath(); ctx.ellipse(ex,eyeY,3.5*sc,3.8*sc,0,0,Math.PI*2); ctx.fill();
      // Pupil
      ctx.fillStyle='#111';
      ctx.beginPath(); ctx.ellipse(ex,eyeY,2*sc,2.2*sc,0,0,Math.PI*2); ctx.fill();
      // Catchlight
      ctx.fillStyle='rgba(255,255,255,0.9)';
      ctx.beginPath(); ctx.arc(ex+1.3*sc,eyeY-1.3*sc,1.1*sc,0,Math.PI*2); ctx.fill();
    });
  }

  // Nose
  ctx.strokeStyle='#b07050'; ctx.lineWidth=1.2*sc; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-2*sc,hy+hr*0.06); ctx.lineTo(-4*sc,hy+hr*0.23); ctx.lineTo(-1*sc,hy+hr*0.25); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(2*sc,hy+hr*0.06);  ctx.lineTo(4*sc,hy+hr*0.23);  ctx.lineTo(1*sc,hy+hr*0.25);  ctx.stroke();
  ctx.fillStyle='rgba(100,60,30,0.3)';
  ctx.beginPath(); ctx.ellipse(-2.5*sc,hy+hr*0.26,2.2*sc,1.5*sc,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(2.5*sc,hy+hr*0.26,2.2*sc,1.5*sc,0,0,Math.PI*2); ctx.fill();

  // Mouth
  ctx.strokeStyle='#aa5535'; ctx.lineWidth=1.6*sc; ctx.lineCap='round';
  if(gkDazzled){
    ctx.beginPath(); ctx.arc(hx,hy+hr*0.5,5*sc,0,Math.PI); ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(-7*sc,hy+hr*0.46);
    ctx.quadraticCurveTo(0,hy+hr*0.4,7*sc,hy+hr*0.46); ctx.stroke();
    // Lip line
    ctx.strokeStyle='rgba(180,90,60,0.4)'; ctx.lineWidth=0.8*sc;
    ctx.beginPath(); ctx.moveTo(-5*sc,hy+hr*0.48); ctx.lineTo(5*sc,hy+hr*0.48); ctx.stroke();
  }

  ctx.restore();

  // Dazzle stars
  if(gkDazzled){
    const t=Date.now()/130;
    for(let i=0;i<6;i++){
      const ang=t+(i/6)*Math.PI*2;
      const rr=(40+Math.sin(t*0.8+i)*8)*sc;
      const sx2=x+Math.cos(ang)*rr;
      const sy2=gkY-52*sc+Math.sin(ang)*rr*0.55;
      ctx.save();
      ctx.font=`${14*sc}px sans-serif`; ctx.textAlign='center';
      ctx.fillStyle=i%2===0?'#00ff88':'#88ff00'; ctx.globalAlpha=0.88;
      ctx.fillText('★',sx2,sy2); ctx.restore();
    }
  }
}
let eyeOffsets=[-1,1];

// ── BALL ─────────────────────────────────────────────
// Ball state: idle → shooting → goal → reset
let ballState = 'idle';    // idle | shooting | goal | reset
let ballX, ballY, ballR;
let ballVX = 0, ballVY = 0;
let ballRot = 0;
let ballShootTimer = 0;    // countdown before next shot
let ballGoalTimer = 0;
let goalTargetX, goalTargetY;
let goalFlash = 0;
let goalCount = 0;

function initBall() {
  ballX = W/2; ballY = H*0.74; ballR = Math.min(W,H)/26;
  ballState = 'idle'; ballVX = 0; ballVY = 0; ballRot = 0;
  ballShootTimer = 1.5 + Math.random()*1.5; // first shot soon
}

function updateBall(dt) {
  ballR = Math.min(W,H)/26;
  if (ballState === 'idle') {
    ballX = W/2; ballY = H*0.74;
    ballShootTimer -= dt;
    if (ballShootTimer <= 0) shootBall();
  } else if (ballState === 'shooting') {
    ballX += ballVX * dt;
    ballY += ballVY * dt;
    ballVY += 180 * dt;
    ballRot += 8 * dt;

    const nt = H*0.085, nb = nt + H*0.22;
    const nl = (W - W*0.62)/2, nr = nl + W*0.62;

    // GK collision check — save if ball gets close to GK body
    const sc = Math.min(W,H)/380;
    const gkBodyW = 38*sc, gkBodyH = 80*sc;
    const gkLeft = gkX - gkBodyW/2;
    const gkRight = gkX + gkBodyW/2;
    const gkTop = gkY - gkBodyH/2;
    const gkBottom = gkY + gkBodyH/2;
    const inGK = ballX > gkLeft - ballR && ballX < gkRight + ballR
              && ballY > gkTop  - ballR && ballY < gkBottom + ballR;

    if (inGK && !gkDazzled) {
      // SAVED — GK blocks the shot
      showSavePop();
      resetBall();
      return;
    }

    // Goal zone reached without hitting GK → GOAL
    if (ballY < nb + ballR*2 && ballX > nl && ballX < nr) {
      ballState = 'goal';
      ballGoalTimer = 1.4;
      goalFlash = 1.0;
      goalCount++;
      score += gkDazzled ? 30 : 15;
      scoreEl.textContent = score;
      showGoalPop();
    }

    // Out of bounds
    if (ballY < -ballR*3 || ballX < -ballR*3 || ballX > W+ballR*3) {
      resetBall();
    }
  } else if (ballState === 'goal') {
    ballX += ballVX * 0.12 * dt;
    ballY += ballVY * 0.12 * dt;
    ballRot += 3 * dt;
    goalFlash = Math.max(0, goalFlash - dt*1.8);
    ballGoalTimer -= dt;
    if (ballGoalTimer <= 0) resetBall();
  } else if (ballState === 'reset') {
    ballShootTimer -= dt;
    if (ballShootTimer <= 0) {
      ballState = 'idle';
      ballX = W/2; ballY = H*0.74;
    }
  }
}

function shootBall() {
  ballState = 'shooting';
  const nl = (W - W*0.62)/2, nr = nl + W*0.62;
  // Aim toward goal, slightly random
  goalTargetX = nl + W*0.62*0.15 + Math.random()*(W*0.62*0.7);
  goalTargetY = H*0.085 + H*0.22*0.2 + Math.random()*H*0.22*0.55;
  const dx = goalTargetX - W/2;
  const dy = goalTargetY - H*0.74;
  const dist = Math.sqrt(dx*dx+dy*dy);
  const spd = dist / 0.55; // reach in ~0.55s
  ballVX = (dx/dist)*spd;
  ballVY = (dy/dist)*spd - 90; // upward kick
}

function resetBall() {
  ballState = 'reset';
  ballShootTimer = 1.8 + Math.random()*1.2;
  ballX = W/2; ballY = H*0.74; ballVX=0; ballVY=0; ballRot=0;
}

function showGoalPop() {
  comboPop.textContent = gkDazzled ? '🎯 GOAL!! +30' : '⚽ GOAL! +15';
  comboPop.style.color = gkDazzled ? '#ffdd00' : '#00ffaa';
  comboPop.style.textShadow = gkDazzled ? '0 0 18px #ffdd00' : '0 0 18px #00ffaa';
  comboPop.style.opacity = '1';
  clearTimeout(comboPop._t);
  comboPop._t = setTimeout(() => comboPop.style.opacity='0', 900);
}

function showSavePop() {
  comboPop.textContent = '🧤 SAVED!';
  comboPop.style.color = '#ff6644';
  comboPop.style.textShadow = '0 0 18px #ff4422';
  comboPop.style.opacity = '1';
  clearTimeout(comboPop._t);
  comboPop._t = setTimeout(() => comboPop.style.opacity='0', 700);
}

function drawBall() {
  const r = ballR || Math.min(W,H)/26;
  const bx = ballX || W/2, by = ballY || H*0.74;

  ctx.save();

  // Goal flash overlay on net area
  if (goalFlash > 0) {
    const nl=(W-W*0.62)/2, nt=H*0.085;
    ctx.fillStyle = `rgba(255,230,60,${goalFlash*0.32})`;
    ctx.fillRect(nl, nt, W*0.62, H*0.22);
  }

  if (ballState === 'reset') { ctx.restore(); return; }

  // Shadow (flattens as ball rises)
  const heightFactor = Math.max(0, Math.min(1, (by - H*0.3) / (H*0.44)));
  ctx.fillStyle = `rgba(0,0,0,${0.28*heightFactor})`;
  ctx.beginPath();
  ctx.ellipse(W/2, H*0.74+r*0.82, r*0.82*heightFactor, r*0.22*heightFactor, 0, 0, Math.PI*2);
  ctx.fill();

  // Ball
  ctx.translate(bx, by);
  ctx.rotate(ballRot);

  const bg = ctx.createRadialGradient(-r*0.3,-r*0.35,r*0.05,0,0,r);
  bg.addColorStop(0,'#fff'); bg.addColorStop(0.55,'#e8e8e8'); bg.addColorStop(1,'#aaa');
  ctx.fillStyle = bg;
  ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill();

  // Pentagon patches
  ctx.fillStyle = '#111';
  [[0,-0.55],[-0.5,-0.18],[-0.3,0.45],[0.3,0.45],[0.5,-0.18]].forEach(([px,py])=>{
    ctx.beginPath(); ctx.arc(px*r, py*r, r*0.22, 0, Math.PI*2); ctx.fill();
  });

  // Motion blur lines when shooting fast
  if (ballState === 'shooting') {
    const spd2 = Math.sqrt(ballVX*ballVX+ballVY*ballVY);
    if (spd2 > 400) {
      ctx.save();
      ctx.globalAlpha = 0.18;
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = r*0.6;
      ctx.lineCap = 'round';
      const nx=-ballVX/spd2, ny=-ballVY/spd2;
      ctx.beginPath(); ctx.moveTo(nx*r*0.5,ny*r*0.5); ctx.lineTo(nx*r*2.2,ny*r*2.2); ctx.stroke();
      ctx.restore();
    }
  }

  ctx.restore();
}

// ── GREEN LASER BEAM ──────────────────────────────────
function drawLaserBeam() {
  if(laserX<-900) return;
  const sx=laserSrcX, sy=laserSrcY;
  ctx.save();
  ctx.lineCap='round';

  // Wide atmospheric scatter
  ctx.globalAlpha=0.055; ctx.strokeStyle='#00ff44'; ctx.lineWidth=45;
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(laserX,laserY); ctx.stroke();

  ctx.globalAlpha=0.14; ctx.strokeStyle='#00ff44'; ctx.lineWidth=20;
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(laserX,laserY); ctx.stroke();

  ctx.globalAlpha=0.35; ctx.strokeStyle='#22ff55'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(laserX,laserY); ctx.stroke();

  ctx.globalAlpha=0.82; ctx.strokeStyle='#88ffaa'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(laserX,laserY); ctx.stroke();

  ctx.globalAlpha=1; ctx.strokeStyle='#ddffdd'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(sx,sy); ctx.lineTo(laserX,laserY); ctx.stroke();

  // Source flare (from stands)
  const fg=ctx.createRadialGradient(sx,sy,0,sx,sy,28);
  fg.addColorStop(0,'rgba(220,255,220,0.95)');
  fg.addColorStop(0.25,'rgba(0,255,80,0.6)');
  fg.addColorStop(1,'rgba(0,255,60,0)');
  ctx.globalAlpha=0.88; ctx.fillStyle=fg;
  ctx.beginPath(); ctx.arc(sx,sy,28,0,Math.PI*2); ctx.fill();

  // Lens flare rays
  ctx.globalAlpha=0.18; ctx.strokeStyle='#88ffbb'; ctx.lineWidth=1;
  for(let a=0;a<Math.PI*2;a+=Math.PI/4){
    ctx.beginPath(); ctx.moveTo(sx,sy);
    ctx.lineTo(sx+Math.cos(a)*36,sy+Math.sin(a)*36); ctx.stroke();
  }
  ctx.globalAlpha=1; ctx.restore();
}

// ── GK AI ─────────────────────────────────────────────
let gkPanicVX = 0, gkPanicT = 0;
function updateGK(dt) {
  const nl=W*0.5-W*0.62*0.5, nr=W*0.5+W*0.62*0.5;
  if(gkDazzled){ dazzleT-=dt; if(dazzleT<=0) gkDazzled=false; }
  gkPhase+=dt;
  const elapsed=30-timeLeft, spd=1+elapsed*0.065;

  if (gkDazzled) {
    // PANIC: fast random zigzag while dazzled
    gkPanicT -= dt;
    if (gkPanicT <= 0) {
      gkPanicVX = (Math.random()-0.5) * 1200;
      gkPanicT = 0.08 + Math.random()*0.12;
    }
    gkX += gkPanicVX * dt;
    gkX = Math.max(nl+10, Math.min(nr-10, gkX));
    // Bounce off walls
    if (gkX <= nl+12 || gkX >= nr-12) gkPanicVX *= -1;
    // Also bob up/down via gkY offset stored separately
    return;
  }

  if(gkState==='idle'){
    const a=Math.sin(gkPhase*2.8)*175, b=Math.sin(gkPhase*1.05+1.2)*80;
    gkX+=(a+b)*spd*dt;
    gkX=Math.max(nl+22,Math.min(nr-22,gkX));
    gkFeintT-=dt;
    if(gkFeintT<=0){ gkFeintDir*=-1; gkFeintT=0.15+Math.random()*0.28; }
    gkX+=gkFeintDir*62*spd*dt;
    gkX=Math.max(nl+22,Math.min(nr-22,gkX));
    if(Math.random()<dt*(0.95+elapsed*0.05)){
      gkState='dive'; gkDiveDir=Math.random()<0.5?-1:1; gkDiveP=0;
    }
  } else if(gkState==='dive'){
    gkDiveP=Math.min(1,gkDiveP+dt*(2.0+spd*0.45));
    gkX+=gkDiveDir*185*spd*dt;
    gkX=Math.max(nl+10,Math.min(nr-10,gkX));
    if(gkDiveP>=1) gkState='recover';
  } else {
    gkDiveP=Math.max(0,gkDiveP-dt*3.2);
    gkX+=(gkBaseX-gkX)*dt*4.5;
    if(gkDiveP<=0) gkState='idle';
  }
}

// ── GUARD LOGIC ──────────────────────────────────────
function initGuard() {
  guardState = 'off'; continuousHitTime = 0;
  guardX = laserSrcX; guardY = laserSrcY;
  guardAlerted = false; guardPenaltyAccum = 0;
}

function updateGuard(dt, isHitting) {
  if (guardState === 'off') {
    if (isHitting) {
      continuousHitTime += dt;
      if (continuousHitTime >= 3.0 && !guardAlerted) {
        // 3秒当て続けたら警告→警備員登場
        guardState = 'warning';
        guardWarningT = 1.5;
        guardAlerted = true;
        guardX = laserSrcX + (Math.random()<0.5?-60:60);
        guardY = laserSrcY - 10;
      }
    } else {
      continuousHitTime = Math.max(0, continuousHitTime - dt*1.5); // 外したら減衰
    }
  } else if (guardState === 'warning') {
    guardWarningT -= dt;
    if (guardWarningT <= 0) {
      guardState = 'approaching';
      // 警備員がレーザー照射元（観客席右上）からプレイヤーへ向かう
      guardTargetX = laserSrcX - 40;
      guardTargetY = laserSrcY - 20;
    }
  } else if (guardState === 'approaching') {
    guardWalkT += dt;
    const dx = guardTargetX - guardX;
    const dy = guardTargetY - guardY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist > 8) {
      const spd = 120;
      guardX += (dx/dist)*spd*dt;
      guardY += (dy/dist)*spd*dt;
    } else {
      // 到着 → 掴む
      guardState = 'grabbing';
      guardGrabT = 0;
    }
  } else if (guardState === 'grabbing') {
    guardGrabT += dt;
    guardWalkT += dt;
    // 減点: 50pt/秒
    if (isHitting) {
      guardPenaltyAccum += 50 * dt;
      if (guardPenaltyAccum >= 1) {
        const sub = Math.floor(guardPenaltyAccum);
        guardPenaltyAccum -= sub;
        score = Math.max(0, score - sub);
        scoreEl.textContent = score;
      }
    }
    // レーザーを3秒離したら警備員が退場
    if (!isHitting) {
      continuousHitTime = Math.max(0, continuousHitTime - dt*2);
      if (continuousHitTime <= 0) {
        guardState = 'leaving';
        guardLeaveT = 1.5;
      }
    } else {
      continuousHitTime = 4; // 当て続けてる間はリセットさせない
    }
  } else if (guardState === 'leaving') {
    guardWalkT += dt;
    guardLeaveT -= dt;
    // ゆっくり元の位置へ戻る
    const dx = laserSrcX - guardX, dy = laserSrcY - guardY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    if (dist > 5) { guardX += (dx/dist)*80*dt; guardY += (dy/dist)*80*dt; }
    if (guardLeaveT <= 0) {
      guardState = 'off';
      guardAlerted = false;
      continuousHitTime = 0;
    }
  }
}

function drawGuard() {
  if (guardState === 'off') return;

  const sc = Math.min(W,H)/380;
  const x = guardX, y = guardY;
  const alpha = guardState==='warning' ? 0.5 + Math.sin(Date.now()/80)*0.5 : 1.0;
  ctx.save();
  ctx.globalAlpha = Math.max(0.3, alpha);
  ctx.translate(x, y);

  const bh=44*sc, bw=24*sc, hr=15*sc;
  const walkBob = Math.sin(guardWalkT*8)*3*sc;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.2)';
  ctx.beginPath(); ctx.ellipse(0,bh/2+4*sc,bw*0.7,3*sc,0,0,Math.PI*2); ctx.fill();

  // Legs
  const legSwing = guardState==='grabbing' ? 0 : Math.sin(guardWalkT*8)*0.25;
  ctx.fillStyle='#1a1a2a';
  ctx.save(); ctx.translate(-bw*0.2, bh*0.4+walkBob); ctx.rotate(legSwing);
  ctx.fillRect(-5*sc,0,10*sc,22*sc); ctx.restore();
  ctx.save(); ctx.translate(bw*0.2, bh*0.4+walkBob); ctx.rotate(-legSwing);
  ctx.fillRect(-5*sc,0,10*sc,22*sc); ctx.restore();

  // Body — black security uniform
  ctx.translate(0, walkBob*0.5);
  const bodyG=ctx.createLinearGradient(-bw/2,-bh/2,bw/2,bh/2);
  bodyG.addColorStop(0,'#2a2a3a'); bodyG.addColorStop(0.5,'#1a1a28'); bodyG.addColorStop(1,'#111120');
  ctx.fillStyle=bodyG;
  ctx.beginPath(); ctx.roundRect(-bw/2,-bh/2,bw,bh,[4*sc,4*sc,2*sc,2*sc]); ctx.fill();

  // Badge
  ctx.fillStyle='#f0c040';
  ctx.beginPath(); ctx.roundRect(-5*sc,-bh*0.28,10*sc,7*sc,1*sc); ctx.fill();
  ctx.fillStyle='#1a1a28'; ctx.font=`bold ${5*sc}px Arial`; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('SEC',-1*sc,-bh*0.245);

  // Arms — grabbing pose
  ctx.fillStyle='#2a2a3a';
  if(guardState==='grabbing'){
    // 両腕を前に伸ばす
    ctx.save(); ctx.translate(-bw/2-2*sc,-bh*0.15); ctx.rotate(-0.8);
    ctx.fillRect(-5*sc,0,10*sc,28*sc); ctx.restore();
    ctx.save(); ctx.translate(bw/2+2*sc,-bh*0.15); ctx.rotate(0.8);
    ctx.fillRect(-5*sc,0,10*sc,28*sc); ctx.restore();
  } else {
    const as=Math.sin(guardWalkT*8)*0.3;
    ctx.save(); ctx.translate(-bw/2-2*sc,-bh*0.15); ctx.rotate(as-0.2);
    ctx.fillRect(-5*sc,0,10*sc,26*sc); ctx.restore();
    ctx.save(); ctx.translate(bw/2+2*sc,-bh*0.15); ctx.rotate(-as+0.2);
    ctx.fillRect(-5*sc,0,10*sc,26*sc); ctx.restore();
  }

  // Head
  const hg=ctx.createRadialGradient(-3*sc,-bh/2-hr*0.9,1*sc,0,-bh/2-hr*0.85,hr);
  hg.addColorStop(0,'#f0d0b0'); hg.addColorStop(1,'#c09070');
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.ellipse(0,-bh/2-hr*0.85,hr,hr*1.05,0,0,Math.PI*2); ctx.fill();

  // Hat
  ctx.fillStyle='#1a1a28';
  ctx.fillRect(-hr*1.1,-bh/2-hr*1.9,hr*2.2,6*sc); // brim
  ctx.beginPath(); ctx.roundRect(-hr*0.75,-bh/2-hr*2.5,hr*1.5,hr*0.7,[3*sc]); ctx.fill(); // cap

  // Eyes — stern look
  ctx.fillStyle='#222';
  ctx.beginPath(); ctx.ellipse(-hr*0.3,-bh/2-hr*0.82,3*sc,2.5*sc,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(hr*0.3,-bh/2-hr*0.82,3*sc,2.5*sc,0,0,Math.PI*2); ctx.fill();
  // Frown
  ctx.strokeStyle='#a06040'; ctx.lineWidth=1.5*sc; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-5*sc,-bh/2-hr*0.6);
  ctx.quadraticCurveTo(0,-bh/2-hr*0.68,5*sc,-bh/2-hr*0.6); ctx.stroke();

  ctx.globalAlpha=1; ctx.restore();

  // Warning speech bubble
  if (guardState==='warning' || (guardState==='approaching' && guardWalkT<1)) {
    ctx.save();
    const bx=x-50*sc, by2=y-80*sc;
    ctx.fillStyle='rgba(255,60,60,0.92)';
    ctx.beginPath(); ctx.roundRect(bx,by2,96*sc,30*sc,6*sc); ctx.fill();
    // Tail
    ctx.beginPath(); ctx.moveTo(bx+70*sc,by2+30*sc); ctx.lineTo(bx+80*sc,by2+42*sc); ctx.lineTo(bx+60*sc,by2+30*sc); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`bold ${11*sc}px 'Noto Sans JP',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('やめろ！🚨',bx+48*sc,by2+15*sc);
    ctx.restore();
  }
  if (guardState==='grabbing') {
    ctx.save();
    const bx=x-55*sc, by2=y-80*sc;
    ctx.fillStyle='rgba(200,20,20,0.92)';
    ctx.beginPath(); ctx.roundRect(bx,by2,110*sc,30*sc,6*sc); ctx.fill();
    ctx.beginPath(); ctx.moveTo(bx+75*sc,by2+30*sc); ctx.lineTo(bx+85*sc,by2+42*sc); ctx.lineTo(bx+65*sc,by2+30*sc); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font=`bold ${11*sc}px 'Noto Sans JP',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`-50pt/秒 💢`,bx+55*sc,by2+15*sc);
    ctx.restore();
  }
}

// ── HIT DETECTION ────────────────────────────────────
let holdScoreAccum = 0;
function checkHit(dt) {
  if(laserX<-900){ holdScoreAccum=0; return false; }
  const sc=Math.min(W,H)/380;
  const headR=18*sc, bodyH=48*sc;
  const eyeX=gkX, eyeY=gkY-bodyH/2-headR*0.88;
  const dx=laserX-eyeX, dy=laserY-eyeY;
  const dist=Math.sqrt(dx*dx+dy*dy);

  if(dist<headR*1.3){
    if(!gkDazzled){
      gkDazzled=true; dazzleT=1.9;
      combo++; maxCombo=Math.max(maxCombo,combo);
      const pts=10*combo; score+=pts;
      scoreEl.textContent=score; comboEl.textContent=combo;
      flash.style.opacity='1'; setTimeout(()=>flash.style.opacity='0',110);
      comboPop.textContent=combo>=3?`${combo}x COMBO! +${pts}`:`HIT! +${pts}`;
      comboPop.style.color='#00ff88'; comboPop.style.textShadow='0 0 18px #00ff88';
      comboPop.style.opacity='1';
      clearTimeout(comboPop._t);
      comboPop._t=setTimeout(()=>comboPop.style.opacity='0',700);
    } else {
      holdScoreAccum += 40 * dt;
      dazzleT = Math.max(dazzleT, 0.35);
      if(holdScoreAccum >= 1){
        const add = Math.floor(holdScoreAccum);
        holdScoreAccum -= add;
        score += add;
        scoreEl.textContent = score;
      }
    }
    return true;
  } else {
    combo=0; comboEl.textContent=0; holdScoreAccum=0;
    return false;
  }
}

// ── LOOP ─────────────────────────────────────────────
let lastT=0;
function loop(ts){
  if(!playing) return;
  const dt=Math.min((ts-lastT)/1000,0.1); lastT=ts;
  ctx.clearRect(0,0,W,H);
  drawStadium(); drawLaserBeam(); drawGK(); drawBall(); drawGuard();
  updateGK(dt); updateBall(dt);
  const isHitting = checkHit(dt);
  updateGuard(dt, isHitting);
  animFrame=requestAnimationFrame(loop);
}

function startTimer(){
  timeLeft=30; timerBar.style.width='100%';
  timerBar.style.background='linear-gradient(90deg,#00ff66,#88ff00)';
  timerInterval=setInterval(()=>{
    timeLeft=Math.max(0,timeLeft-0.1);
    const pct=(timeLeft/30)*100;
    timerBar.style.width=pct+'%';
    if(pct<30) timerBar.style.background='linear-gradient(90deg,#ff4400,#ff0000)';
    else if(pct<60) timerBar.style.background='linear-gradient(90deg,#ffe600,#ff6600)';
    if(timeLeft<=0) endGame();
  },100);
}

function startGame(){
  score=0; combo=0; maxCombo=0; goalCount=0;
  gkX=W/2; gkState='idle'; gkDiveP=0; gkDazzled=false; gkPhase=0;
  gkPanicVX=0; gkPanicT=0;
  scoreEl.textContent='0'; comboEl.textContent='0';
  overlay.style.display='none'; laserDot.style.display='none';
  playing=true; initBall(); initGuard(); startTimer(); lastT=performance.now();
  animFrame=requestAnimationFrame(loop);
}

function endGame(){
  playing=false; clearInterval(timerInterval); cancelAnimationFrame(animFrame);
  laserDot.style.display='none';
  const grade=score>=600?'👑 LEGENDARY':score>=350?'🔥 EXPERT':score>=180?'⚡ GOOD':'😅 KEEP TRYING';
  overlay.innerHTML=`
    <h1>タイムアップ！</h1>
    <div class="sub">最終スコア</div>
    <div style="font-size:52px;color:#88ff00;text-shadow:0 0 20px #88ff0099;font-family:'Russo One',sans-serif">${score}</div>
    <div class="sub">最大コンボ: <b style="color:#00ff88">${maxCombo}x</b> &nbsp;|&nbsp; ゴール: <b style="color:#ffdd44">⚽${goalCount}</b><br><br>${grade}</div>
    <button class="btn" onclick="startGame()">もう一度</button>
  `;
  overlay.style.display='flex';
}
</script>
